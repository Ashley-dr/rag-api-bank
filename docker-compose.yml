# version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TOP_K_RESULTS: ${TOP_K_RESULTS}
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg18
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_api
    ports:
      - "5433:5432"
      # - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql # CRITICAL FIX 2

volumes:
  postgres_data:
